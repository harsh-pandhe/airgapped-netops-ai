name: Feature / Epic task
description: Propose a product feature or roadmap task
labels: [enhancement]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome does this deliver, and which PS-13 objective does it serve?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: Concrete implementation steps.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we verify this is done?
    validations:
      required: true
  - type: checkboxes
    id: airgap
    attributes:
      label: Air-gap compliance
      options:
        - label: This work introduces no runtime dependency on external networks
